# UAT CDS (https). ONIX appends the action path, e.g. target + "/catalog_publish" → full URL:
#   https://uat-cds.ubc.nbsl.org.in/cds/catalog_publish
# Other documented UAT endpoints (reference):
#   https://uat-cds.ubc.nbsl.org.in/cds/discover
#   https://uat-cds.ubc.nbsl.org.in/cds/on_discover
#   https://uat-cds.ubc.nbsl.org.in/cds/actuator/health
routingRules:
  - domain: beckn.one:deg:ev-charging
    version: "2.0.0"
    targetType: url
    target:
      url: https://uat-cds.ubc.nbsl.org.in/cds
      excludeAction: false
    endpoints:
      - catalog_publish
  - domain: beckn.one:deg:ev-charging
    version: "2.0.0"
    targetType: bap
    target: {}
    endpoints:
      - on_select
      - on_init
      - on_confirm
      - on_status
      - on_track
      - on_cancel
      - on_update
      - on_rating
      - on_support
